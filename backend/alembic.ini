# Alembic configuration file for TeamFlow.
#
# Security note (T-02-01): sqlalchemy.url is intentionally left blank here.
# The DSN is read from settings.database_url (environment variable) in env.py.
# NEVER put a real password in this file — it is committed to git.

[alembic]
# Path to migration scripts, relative to this file's location
script_location = alembic

# No hardcoded DSN — env.py reads from settings.database_url (D-06, T-02-01)
# sqlalchemy.url is set programmatically in env.py via settings

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
